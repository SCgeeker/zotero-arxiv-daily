name: Send emails daily
on:
  workflow_dispatch:
  schedule:
    - cron: '0 22 * * *'

jobs:
  calculate-and-send:
    runs-on: ubuntu-latest
    steps:
      - name: 安裝 twccli 並設定認證
        env:
          TWCC_API_KEY: ${{ secrets.TWCC_API_KEY }}
          TWCC_PROJECT_CODE: ${{ secrets.TWCC_PROJECT_CODE }}
          TWCC_S3_ACCESS_KEY: ${{ secrets.TWCC_S3_ACCESS_KEY }}
          TWCC_S3_SECRET_KEY: ${{ secrets.TWCC_S3_SECRET_KEY }}
        run: |
          pip install TWCC-CLI

          # 修正新版 twccli 的 os.mkdir bug（目錄已存在時會 crash）
          TWCCLI_FILE=$(python3 -c "import twccli, os; print(os.path.join(os.path.dirname(twccli.__file__), 'twccli.py'))")
          sed -i 's/os\.mkdir(_TWCC_DATA_DIR_)/os.makedirs(_TWCC_DATA_DIR_, exist_ok=True)/g' "$TWCCLI_FILE"

          # 建立完整認證檔（含 _meta、s3、projects，否則 twccli 內部 KeyError）
          mkdir -p ~/.twcc_data
          python3 - << PYEOF
          import os, datetime
          api_key   = os.environ['TWCC_API_KEY']
          proj_code = os.environ['TWCC_PROJECT_CODE']
          s3_access = os.environ['TWCC_S3_ACCESS_KEY']
          s3_secret = os.environ['TWCC_S3_SECRET_KEY']
          now = datetime.datetime.now().strftime('%Y-%m-%d %H:%M:%S')
          cred = f"""_default:
            twcc_api_key: {api_key}
            twcc_proj_code: {proj_code}
            twcc_s3_access_key: {s3_access}
            twcc_s3_secret_key: {s3_secret}
            twcc_username: tcpsr001
          _meta:
            cli_version: 0.6.1
            ctime: '{now}'
            ga_country: TW
            user_agent: TWCC-CLI
          projects:
            {proj_code}:
              CNTR: 130365
              COS: 130371
              HPCJ: 130368
              VCS: 130362
          """
          open(os.path.expanduser("~/.twcc_data/credential"), "w").write(cred)
          print("認證設定完成")
          PYEOF

      - name: 啟動 TWCC CCS 容器執行完整流程
        env:
          ZOTERO_ID: ${{ secrets.ZOTERO_ID }}
          ZOTERO_KEY: ${{ secrets.ZOTERO_KEY }}
          SENDER: ${{ secrets.SENDER }}
          RECEIVER: ${{ secrets.RECEIVER }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          export LANG=C.UTF-8
          export LC_ALL=C.UTF-8
          export PYTHONIOENCODING=UTF-8

          # 確認認證檔
          echo "=== credential 檢查 ==="
          cat ~/.twcc_data/credential | sed 's/\(api_key: \).*/\1***/'
          echo "=== twccli 版本 ==="
          twccli --version 2>&1 || true

          echo "建立 TWCC CCS 容器..."
          set +e
          RAW_JSON=$(twccli mk ccs \
            -n "arxiv$(date +%m%d%H)" \
            -itype "PyTorch" \
            -gpu 1 \
            -envk ZOTERO_ID       -envv "$ZOTERO_ID" \
            -envk ZOTERO_KEY      -envv "$ZOTERO_KEY" \
            -envk SENDER          -envv "$SENDER" \
            -envk RECEIVER        -envv "$RECEIVER" \
            -envk SENDER_PASSWORD -envv "$SENDER_PASSWORD" \
            -envk RESEND_API_KEY  -envv "$RESEND_API_KEY" \
            -cmd "bash /work/tcpsr001/scripts/arxiv_tldr.sh" \
            -wait -json 2>&1)
          TWCC_EXIT=$?
          set -e
          echo "twccli exit code: $TWCC_EXIT"
          echo "twccli 輸出: $RAW_JSON"

          [ $TWCC_EXIT -ne 0 ] && exit 1

          CID=$(echo "$RAW_JSON" | python3 -c \
            "import sys,json; lines=sys.stdin.read(); d=json.loads(lines); print(d['id'])")

          echo "容器 ID: $CID"

          # 等待腳本執行完成（最多 60 分鐘）
          for i in $(seq 1 60); do
            RAW_STATUS=$(twccli ls ccs -s $CID -json 2>/dev/null || echo "[]")
            STATUS=$(echo "$RAW_STATUS" | python3 -c "import sys,json;d=json.load(sys.stdin);print(d[0].get('status','unknown') if isinstance(d,list) and d else d.get('status','unknown') if isinstance(d,dict) else 'unknown')" 2>/dev/null || echo "unknown")
            echo "[$i/60] 狀態: $STATUS"
            if [ "$STATUS" = "Stopped" ] || [ "$STATUS" = "Error" ]; then
              break
            fi
            sleep 60
          done

          # 取得 log
          twccli ls ccs -s $CID -log 2>/dev/null || true

          # 刪除容器（節省額度）
          twccli rm ccs -s $CID -f
          echo "容器已刪除"
